<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kural iPhone Recorder</title>
  <style>
    :root {
      --bg: #1C1C1E;
      --panel: #2C2C2E;
      --panel-2: #3A3A3C;
      --accent: #00C9A7;
      --text: #FFFFFF;
      --muted: #C7C7CC;
      --danger: #FF453A;
      color-scheme: dark;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      -webkit-font-smoothing: antialiased;
    }

    button, select {
      min-height: 60px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      touch-action: manipulation;
    }

    button:disabled, select:disabled {
      opacity: 0.48;
    }

    .app {
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 20px calc(24px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    header {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .brand { font-size: 20px; font-weight: 700; }
    .counter { color: var(--muted); font-size: 14px; font-weight: 700; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      padding: 28px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .bar {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 240ms ease;
    }

    .sentence {
      min-height: 190px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: var(--panel);
      padding: 28px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 30px;
      line-height: 1.22;
      font-weight: 700;
    }

    .status, .picker {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      padding: 14px 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .picker {
      display: none;
      text-align: left;
      padding: 12px;
    }

    .picker span {
      display: block;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--panel-2);
      color: var(--text);
      padding: 0 14px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .primary {
      background: var(--accent);
      color: var(--bg);
      font-size: 18px;
      font-weight: 800;
    }

    .stop {
      position: relative;
      overflow: hidden;
      background: var(--danger);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .light {
      background: var(--text);
      color: var(--bg);
      font-size: 16px;
      font-weight: 900;
    }

    .ghost {
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pulse-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 10px;
      border-radius: 999px;
      background: white;
      animation: pulse 1s ease-in-out infinite;
      vertical-align: middle;
    }

    audio {
      width: 100%;
    }

    .complete {
      display: none;
      min-height: calc(100vh - 120px);
      place-items: center;
      text-align: center;
    }

    .complete h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    .complete p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.65; }
      50% { transform: scale(1.3); opacity: 1; }
    }
  </style>
</head>
<body>

    <header>

      <label class="picker" id="devicePickerWrap">

        <select id="devicePicker"></select>
      </label>

      <section class="controls">
        <button class="primary" id="enableButton" type="button">Enable Mic</button>
        <button class="primary" id="recordButton" type="button" style="display:none">Record</button>
        <button class="stop" id="stopButton" type="button" style="display:none"><span class="pulse-dot"></span>Stop <span id="timerText">0:00</span></button>
        <audio id="player" controls style="display:none"></audio>
        <button class="secondary" id="playButton" type="button" style="display:none">Play Back</button>
        <button class="light" id="downloadButton" type="button" style="display:none">Download & Next</button>
        <div class="row">
          <button class="ghost" id="rerecordButton" type="button" style="display:none">Re-record</button>
          <button class="ghost" id="skipButton" type="button">Skip</button>
        </div>
      </section>
    </main>

    <section class="complete" id="completeView">
      <div>
        <h1>List complete!</h1>

      </div>
    </section>
  </div>

    'Glue the sheet to the dark blue background.',
    'It is easy to tell the depth of a well.',
    'These days a chicken leg is a rare dish.',
  ],
  list_40: [
    'Rice is often served in round bowls.',
    'The juice of lemons makes fine punch.',
    'The box was thrown beside the parked truck.',
    'The hogs were fed chopped corn and garbage.',
    'Four hours of steady work faced us.',
    'A large size in stockings is hard to sell.',
    'The boy was there when the sun rose.',
    'A rod is used to catch pink salmon.',
    'The source of the huge river is the clear spring.',
    'Kick the ball straight and follow through.',
  ],
};

    const lists = Object.entries(HARVARD_SENTENCES).map(([id, sentences]) => ({
      id,
      number: Number(id.replace('list_', '')),
      title: 'List ' + id.replace('list_', ''),
      sentences,
    }));
    const total = lists.reduce((sum, list) => sum + list.sentences.length, 0);

    const els = {
      app: document.getElementById('app'),
      recorderView: document.getElementById('recorderView'),
      completeView: document.getElementById('completeView'),
      listCounter: document.getElementById('listCounter'),
      progressText: document.getElementById('progressText'),
      filenameText: document.getElementById('filenameText'),
      barFill: document.getElementById('barFill'),
      sentenceText: document.getElementById('sentenceText'),
      statusText: document.getElementById('statusText'),
      devicePickerWrap: document.getElementById('devicePickerWrap'),
      devicePicker: document.getElementById('devicePicker'),
      enableButton: document.getElementById('enableButton'),
      recordButton: document.getElementById('recordButton'),
      stopButton: document.getElementById('stopButton'),
      playButton: document.getElementById('playButton'),
      downloadButton: document.getElementById('downloadButton'),
      rerecordButton: document.getElementById('rerecordButton'),
      skipButton: document.getElementById('skipButton'),
      timerText: document.getElementById('timerText'),
      player: document.getElementById('player'),
    };

    let state = 'idle';
    let listIndex = Number(localStorage.getItem('kural_list_index') || '0');
    let sentenceIndex = Number(localStorage.getItem('kural_sentence_index') || '0');
    let stream = null;
    let recorder = null;
    let chunks = [];
    let blob = null;
    let objectUrl = null;
    let timer = null;
    let elapsed = 0;
    let selectedDeviceId = '';
    let audioInputs = [];

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function currentList() {
      return lists[listIndex];
    }

    function baseFilename() {
      return 'list_' + pad(currentList().number) + '_s' + pad(sentenceIndex + 1);
    }

    function extensionFor(type) {
      if (type.includes('mp4') || type.includes('aac')) return 'm4a';
      if (type.includes('webm')) return 'webm';
      if (type.includes('ogg')) return 'ogg';
      if (type.includes('wav')) return 'wav';
      return 'm4a';
    }

    function filename() {
      return baseFilename() + '.' + extensionFor(blob?.type || preferredMimeType() || 'audio/mp4');
    }

    function formatElapsed(seconds) {
      const minutes = Math.floor(seconds / 60);
      return minutes + ':' + String(seconds % 60).padStart(2, '0');
    }

    function preferredMimeType() {
      if (!window.MediaRecorder) return '';
      const candidates = ['audio/mp4', 'audio/aac', 'audio/webm;codecs=opus', 'audio/webm', 'audio/wav'];
      return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || '';
    }

    function savePosition() {
      localStorage.setItem('kural_list_index', String(listIndex));
      localStorage.setItem('kural_sentence_index', String(sentenceIndex));
    }

    function setStatus(text) {
      els.statusText.textContent = text;
    }

    function stopStream() {
      if (stream) stream.getTracks().forEach((track) => track.stop());
      stream = null;
    }

    function revokeObjectUrl() {
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = null;
    }

    function clearRecording() {
      blob = null;
      chunks = [];
      revokeObjectUrl();
      els.player.removeAttribute('src');
      els.player.style.display = 'none';
      els.playButton.style.display = 'none';
      els.downloadButton.style.display = 'none';
      els.rerecordButton.style.display = 'none';
    }

    function render() {
      if (listIndex >= lists.length) {
        els.recorderView.style.display = 'none';
        els.completeView.style.display = 'grid';
        return;
      }

      const list = currentList();
      const position = listIndex * list.sentences.length + sentenceIndex + 1;
      els.listCounter.textContent = list.title + ' · ' + (sentenceIndex + 1) + '/10';
      els.progressText.textContent = 'Progress ' + position + '/' + total;
      els.filenameText.textContent = filename();
      els.barFill.style.width = (position / total * 100) + '%';
      els.sentenceText.textContent = '“' + list.sentences[sentenceIndex] + '”';
    }

    function renderControls() {
      els.enableButton.style.display = stream ? 'none' : 'block';
      els.recordButton.style.display = state === 'idle' && stream ? 'block' : 'none';
      els.stopButton.style.display = state === 'recording' ? 'block' : 'none';
      els.playButton.style.display = state === 'recorded' ? 'block' : 'none';
      els.downloadButton.style.display = state === 'recorded' ? 'block' : 'none';
      els.rerecordButton.style.display = state === 'recorded' ? 'block' : 'none';
      els.skipButton.disabled = state === 'recording';
      els.devicePicker.disabled = state === 'recording';
    }

    async function refreshDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      audioInputs = devices.filter((device) => device.kind === 'audioinput');
      const iPhoneInput = audioInputs.find((device) => device.label.toLowerCase().includes('iphone'));
      if (!selectedDeviceId || !audioInputs.some((device) => device.deviceId === selectedDeviceId)) {
        selectedDeviceId = (iPhoneInput || audioInputs[0] || {}).deviceId || '';
      }

      els.devicePicker.innerHTML = '';
      audioInputs.forEach((device, index) => {
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.textContent = device.label || 'Microphone ' + (index + 1);
        els.devicePicker.appendChild(option);
      });
      els.devicePicker.value = selectedDeviceId;
      els.devicePickerWrap.style.display = audioInputs.length > 1 ? 'block' : 'none';
    }

    async function openMic(deviceId = selectedDeviceId) {
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus('This browser cannot record audio here. Try opening in Safari.');
        return false;
      }

      stopStream();
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: deviceId ? { deviceId: { exact: deviceId } } : true,
        });
        await refreshDevices();
        const label = audioInputs.find((device) => device.deviceId === selectedDeviceId)?.label;
        setStatus(label ? 'Microphone: ' + label : 'Microphone ready');
        renderControls();
        return true;
      } catch (error) {
        setStatus('Could not open microphone. If this is a file page, try Safari and allow mic access.');
        renderControls();
        return false;
      }
    }

    function startTimer() {
      elapsed = 0;
      els.timerText.textContent = formatElapsed(elapsed);
      timer = setInterval(() => {
        elapsed += 1;
        els.timerText.textContent = formatElapsed(elapsed);
        setStatus('Recording ' + formatElapsed(elapsed));
      }, 1000);
    }

    function stopTimer() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    async function startRecording() {
      if (!stream) {
        const opened = await openMic();
        if (!opened) return;
      }

      clearRecording();
      const activeDeviceId = stream?.getAudioTracks()[0]?.getSettings().deviceId;
      if (selectedDeviceId && activeDeviceId !== selectedDeviceId) {
        const opened = await openMic(selectedDeviceId);
        if (!opened) return;
      }

      const mimeType = preferredMimeType();
      recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
      chunks = [];

      recorder.ondataavailable = (event) => {
        if (event.data.size > 0) chunks.push(event.data);
      };

      recorder.onstop = () => {
        stopTimer();
        blob = new Blob(chunks, { type: recorder.mimeType || 'audio/mp4' });
        objectUrl = URL.createObjectURL(blob);
        els.player.src = objectUrl;
        els.player.style.display = 'block';
        state = 'recorded';
        setStatus('Ready to review');
        render();
        renderControls();
      };

      state = 'recording';
      recorder.start();
      startTimer();
      renderControls();
    }

    function stopRecording() {
      if (recorder?.state === 'recording') recorder.stop();
    }

    function advance() {
      clearRecording();
      state = 'idle';
      if (sentenceIndex < currentList().sentences.length - 1) {
        sentenceIndex += 1;
      } else if (listIndex < lists.length - 1) {
        listIndex += 1;
        sentenceIndex = 0;
      } else {
        listIndex = lists.length;
      }
      savePosition();
      render();
      renderControls();
      if (stream) {
        const label = audioInputs.find((device) => device.deviceId === selectedDeviceId)?.label;
        setStatus(label ? 'Microphone: ' + label : 'Microphone ready');
      }
    }

    function downloadAndNext() {
      if (!blob || !objectUrl) return;
      const link = document.createElement('a');
      link.href = objectUrl;
      link.download = filename();
      document.body.appendChild(link);
      link.click();
      link.remove();
      setStatus('Downloaded ' + filename());
      setTimeout(advance, 500);
    }

    els.enableButton.addEventListener('click', () => openMic());
    els.recordButton.addEventListener('click', startRecording);
    els.stopButton.addEventListener('click', stopRecording);
    els.playButton.addEventListener('click', () => {
      els.player.currentTime = 0;
      els.player.play();
    });
    els.downloadButton.addEventListener('click', downloadAndNext);
    els.rerecordButton.addEventListener('click', () => {
      clearRecording();
      state = 'idle';
      setStatus('Ready to record again');
      renderControls();
    });
    els.skipButton.addEventListener('click', advance);
    els.devicePicker.addEventListener('change', async (event) => {
      selectedDeviceId = event.target.value;
      clearRecording();
      state = 'idle';
      await openMic(selectedDeviceId);
    });

    if (navigator.mediaDevices?.addEventListener) {
      navigator.mediaDevices.addEventListener('devicechange', refreshDevices);
    }

    render();
    renderControls();
  </script>
</body>
</html>
